<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Profesional UPEC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>

<body class="bg-slate-100 h-screen flex flex-col font-sans">

    <header class="bg-indigo-600 text-white p-4 shadow-md flex justify-between items-center">
        <div>
            <h1 class="text-xl font-bold">Chat de Sistemas</h1>
            <p class="text-indigo-200 text-sm">Tiempo Real</p>
        </div>
        <div class="flex items-center gap-2">
            <div id="status-dot" class="w-3 h-3 rounded-full bg-red-500"></div>
            <span id="status-text" class="text-sm font-medium">Desconectado</span>
        </div>
    </header>

    <main class="flex-1 flex justify-center p-4 md:p-8 overflow-hidden">
        <div
            class="bg-white w-full max-w-3xl rounded-xl shadow-lg flex flex-col border border-gray-200 overflow-hidden">

            <div class="bg-gray-50 p-4 border-b border-gray-200 flex gap-4">
                <input type="text" id="username" placeholder="Ingresa tu nombre..."
                    class="flex-1 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
            </div>

            <div id="chat-box"
                class="flex-1 p-4 overflow-y-auto bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] bg-gray-50 flex flex-col gap-3">
                <div class="text-center text-gray-400 text-sm my-2">Los mensajes no se guardan. Solo los ves mientras
                    estás conectado.</div>
            </div>

            <div class="p-4 bg-white border-t border-gray-200 flex gap-2">
                <input type="text" id="message" placeholder="Escribe un mensaje aquí..."
                    class="flex-1 px-4 py-3 border rounded-full bg-gray-100 focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all"
                    onkeypress="if(event.key === 'Enter') sendMessage()">
                <button onclick="sendMessage()"
                    class="bg-indigo-600 hover:bg-indigo-700 text-white rounded-full p-3 px-6 font-semibold transition-all shadow-md transform hover:scale-105">
                    Enviar
                </button>
            </div>
        </div>
    </main>

    <script>
        // 1. Conectar al servidor de Render que creaste
        const socket = io('https://sistemas-g0kh.onrender.com');

        // Elementos de la interfaz
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const chatBox = document.getElementById('chat-box');
        const messageInput = document.getElementById('message');
        const usernameInput = document.getElementById('username');

        // 2. Manejo de conexión
        socket.on('connect', () => {
            statusDot.classList.replace('bg-red-500', 'bg-green-500');
            statusText.innerText = 'Conectado';
        });

        socket.on('disconnect', () => {
            statusDot.classList.replace('bg-green-500', 'bg-red-500');
            statusText.innerText = 'Desconectado';
        });

        // 3. Función para enviar mensajes
        function sendMessage() {
            const text = messageInput.value.trim();
            const user = usernameInput.value.trim() || 'Anónimo';

            if (text !== '') {
                const mensajeData = {
                    usuario: user,
                    texto: text,
                    hora: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                };

                // Enviar al servidor
                socket.emit('mensaje', mensajeData);
                messageInput.value = ''; // Limpiar el input
            }
        }

        // 4. Escuchar los mensajes que retransmite el servidor
        socket.on('mensaje', (data) => {
            // Determinar si el mensaje lo envié yo u otra persona
            const isMine = data.usuario === (usernameInput.value.trim() || 'Anónimo');

            // Crear el elemento HTML del mensaje
            const messageDiv = document.createElement('div');
            messageDiv.className = `max-w-[75%] rounded-2xl p-3 shadow-sm ${isMine ? 'bg-indigo-600 text-white self-end rounded-tr-none' : 'bg-white text-gray-800 self-start border border-gray-200 rounded-tl-none'}`;

            messageDiv.innerHTML = `
                <div class="font-bold text-xs ${isMine ? 'text-indigo-200' : 'text-indigo-600'} mb-1">${data.usuario}</div>
                <div class="text-sm">${data.texto}</div>
                <div class="text-right text-[10px] mt-1 ${isMine ? 'text-indigo-200' : 'text-gray-400'}">${data.hora}</div>
            `;

            chatBox.appendChild(messageDiv);

            // Auto-scroll hacia abajo
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    </script>
</body>

</html>
