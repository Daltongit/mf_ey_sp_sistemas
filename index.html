<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Chat Pro | UPEC</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <i class="fa-solid fa-network-wired"></i>
                <h1>WebSocket Chat <span>Pro</span></h1>
            </div>
            <div class="status-indicator">
                <span id="status-dot" class="dot disconnected"></span>
                <span id="status-text">Desconectado</span>
            </div>
        </header>

        <section class="connection-panel">
            <div class="input-group">
                <i class="fa-solid fa-server"></i>
                <input type="text" id="server-url" value="https://sistemas-g0kh.onrender.com" readonly>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="username" placeholder="Tu alias (Ej: Milton)">
            </div>
            <div class="buttons">
                <button id="btn-connect" class="btn btn-primary"><i class="fa-solid fa-plug"></i> Conectar</button>
                <button id="btn-disconnect" class="btn btn-danger" disabled><i class="fa-solid fa-plug-circle-xmark"></i> Desconectar</button>
            </div>
        </section>

        <section class="chat-area">
            <div id="chat-box" class="chat-box">
                <div class="msg-system">Servidor: Esperando conexión...</div>
            </div>
        </section>

        <section class="send-panel">
            <input type="text" id="message-input" placeholder="Escribe un mensaje..." disabled>
            <button id="btn-send" class="btn btn-send" disabled><i class="fa-solid fa-paper-plane"></i></button>
        </section>

        <footer>
            <div class="stat"><i class="fa-solid fa-arrow-up"></i> Enviados: <span id="count-sent">0</span></div>
            <div class="stat"><i class="fa-solid fa-arrow-down"></i> Recibidos: <span id="count-received">0</span></div>
        </footer>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
